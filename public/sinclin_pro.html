<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SINCLIN PRO</title>

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f4f6f8;
    color:#1c1c1c;
}

.sidebar {
    width:260px;
    height:100vh;
    position:fixed;
    background:#ffffff;
    border-right:1px solid #e0e0e0;
    padding:25px;
}

.sidebar h2 {
    font-weight:600;
    margin-bottom:30px;
}

.sidebar div {
    margin:12px 0;
    cursor:pointer;
    color:#555;
}

.sidebar div:hover {
    color:#000;
}

.main {
    margin-left:260px;
    padding:40px;
}

.card {
    background:#fff;
    padding:25px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.04);
    transition:0.2s;
}

.card:hover {
    transform:translateY(-3px);
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

input {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-top:10px;
}

button {
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#2d8cff;
    color:#fff;
    cursor:pointer;
    margin-top:10px;
}

.timeline {
    border-left:3px solid #2d8cff;
    padding-left:20px;
}

.item {
    margin-bottom:20px;
}

.badge {
    background:#e8f0ff;
    padding:5px 10px;
    border-radius:6px;
    display:inline-block;
}
</style>

</head>
<body>

<div class="sidebar">
    <h2>SINCLIN</h2>
    <div onclick="nav('dashboard')">Dashboard</div>
    <div onclick="nav('pacientes')">Pacientes</div>
    <div onclick="nav('anamnese')">Anamnese</div>
    <div onclick="nav('prontuario')">ProntuÃrio</div>
    <div onclick="nav('ia')">IA ClÚnica</div>
    <div onclick="nav('financeiro')">Financeiro</div>
    <div onclick="nav('estoque')">Estoque</div>
</div>

<div class="main" id="app"></div>

<script>

let anamneseStep = 0;
let respostas = {};

function nav(page){

if(page==="dashboard"){
app.innerHTML = 
<h1>Dashboard</h1>
<div class="grid">
<div class="card">Faturamento: R$ 12.450</div>
<div class="card">Pacientes hoje: 18</div>
<div class="card">Estoque crÚtico: 2 itens</div>
</div>;
}

if(page==="pacientes"){
app.innerHTML = 
<h1>Pacientes</h1>
<div class="card">
<input placeholder="Buscar paciente">
<div class="item">Maria Silva</div>
<div class="item">JoÐo Pereira</div>
</div>;
}

if(page==="anamnese"){
renderAnamnese();
}

if(page==="prontuario"){
app.innerHTML = 
<h1>ProntuÃrio</h1>
<div class="card timeline">
<div class="item"><span class="badge">2024</span> Botox</div>
<div class="item"><span class="badge">2025</span> Bioestimulador</div>
</div>;
}

if(page==="ia"){
app.innerHTML = 
<h1>IA ClÚnica</h1>
<div class="card">
<p id="analysis">Analisando...</p>
</div>;
analyze();
}

if(page==="financeiro"){
app.innerHTML = 
<h1>Financeiro</h1>
<div class="card">Receita mensal: R$ 85.000</div>;
}

if(page==="estoque"){
app.innerHTML = 
<h1>Estoque</h1>
<div class="card">
Botox: 5 unidades<br>
Preenchedor: 1 unidade (baixo)
</div>;
}

}

function renderAnamnese(){
let perguntas = [
"Qual a principal queixa?",
"HÃ quanto tempo?",
"JÃ realizou procedimentos?"
];

if(anamneseStep < perguntas.length){
app.innerHTML = 
<h1>Anamnese Inteligente</h1>
<div class="card">
<p>\</p>
<input id="resp">
<button onclick="next()">Prµximo</button>
<button onclick="voz()">??</button>
</div>;
}else{
app.innerHTML = 
<h1>ConclusÐo</h1>
<div class="card">
<p>Anamnese finalizada</p>
</div>;
}
}

function next(){
let val = document.getElementById("resp").value;
respostas[anamneseStep] = val;
anamneseStep++;
renderAnamnese();
}

function voz(){
let rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang='pt-BR';
rec.start();
rec.onresult = e=>{
document.getElementById("resp").value = e.results[0][0].transcript;
};
}

function analyze(){
let txt = "Paciente com padrÐo leve, sugerido bioestimulador.";
document.getElementById("analysis").innerText = txt;
speak(txt);
}

function speak(t){
let msg = new SpeechSynthesisUtterance(t);
speechSynthesis.speak(msg);
}

nav('dashboard');

</script>

</body>
</html>
