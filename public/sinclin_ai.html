<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SINCLIN AI</title>
<style>
body { font-family: Arial; background:#0b0b0b; color:#eee; padding:20px;}
.ok {color:#0f0}
.err {color:#f33}
.warn {color:#ff0}
#chat {margin-top:20px; border:1px solid #333; padding:10px; height:200px; overflow:auto;}
input {width:80%; padding:10px;}
button {padding:10px;}
</style>
</head>
<body>

<h1>SINCLIN AI</h1>

<div id="status"></div>

<button onclick="update()">Atualizar</button>
<button onclick="voice()">??</button>

<div id="chat"></div>

<input id="cmd" placeholder="Digite comando...">
<button onclick="send()">Enviar</button>

<script>
let history=[];

async function load(){
    let res = await fetch('/.sinclin/state.json');
    let data = await res.json();
    render(data);
}

function render(data){
    let html='';
    for(let k in data){
        let v=data[k];
        let cls='ok';
        if(v.includes('OFFLINE')||v.includes('ERRO')) cls='err';
        if(v.includes('DIVERGENTE')) cls='warn';
        html += <div class="\">\ENV: \</div>;
    }
    document.getElementById('status').innerHTML=html;
}

function update(){
    fetch('/sinclin-run');
    setTimeout(load,1000);
}

function send(){
    let txt=document.getElementById('cmd').value;
    process(txt);
}

function voice(){
    let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang='pt-BR';
    rec.start();
    rec.onresult=e=>{
        let txt=e.results[0][0].transcript;
        process(txt);
    };
}

function process(txt){
    history.push("USER: "+txt);

    let res="";

    if(txt.includes("estado")){
        res="Sistema analisando estado";
        update();
    }

    else if(txt.includes("erro")){
        res="Verificando histÛrico de falhas";
    }

    else if(txt.includes("histÛrico")){
        res="Consultando eventos passados";
    }

    else if(txt.includes("corrigir")){
        res="Sugest„o: verificar render e dependÍncias";
    }

    else{
        res="Comando n„o reconhecido";
    }

    history.push("AI: "+res);
    renderChat();

    speak(res);
}

function renderChat(){
    document.getElementById('chat').innerHTML=history.join("<br>");
}

function speak(txt){
    let msg=new SpeechSynthesisUtterance(txt);
    speechSynthesis.speak(msg);
}

load();
</script>

</body>
</html>
